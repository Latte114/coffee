<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Samples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="manage-samples.js?v=1.0" defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                จัดการตัวอย่างห้อง: <span id="roomNameDisplay">กำลังโหลด...</span>
            </h1>
            <button id="backToHostBtn" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                กลับสู่ Dashboard
            </button>
        </div>

        <div class="mb-8 p-6 border rounded-lg bg-gray-50">
            <h2 class="text-xl font-semibold mb-4">เพิ่มตัวอย่างใหม่</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label for="sampleNumberInput" class="block text-sm font-medium text-gray-700">หมายเลขตัวอย่าง</label>
                    <input type="number" id="sampleNumberInput" placeholder="เช่น 1, 2, 3" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div class="md:col-span-2">
                    <label for="sampleDescriptionInput" class="block text-sm font-medium text-gray-700">รายละเอียด (ตัวเลือก)</label>
                    <input type="text" id="sampleDescriptionInput" placeholder="เช่น กาแฟจากเอธิโอเปีย" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>
            <button id="addSampleBtn" class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 w-full md:w-auto">
                เพิ่มตัวอย่าง
            </button>
        </div>

        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-4">รายการตัวอย่างที่มีอยู่</h2>
            <div id="samplesListContainer">
                <ul id="samplesList" class="space-y-3">
                    </ul>
                <p id="noSamplesMessage" class="hidden text-gray-500 text-center mt-4">ยังไม่มีตัวอย่างในห้องนี้</p>
            </div>
        </div>
    </div>
</body>
</html>
