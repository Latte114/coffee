<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cupping Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="results.js?v=1.0" defer></script>
</head>
<body class="bg-gray-100 p-4 min-h-screen">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 id="roomName" class="text-3xl font-bold mb-4 text-center">Cupping Results: Loading...</h1>
    <p id="roomStatus" class="text-center text-gray-600 mb-6">Status: Loading...</p>

    <div id="summaryResults" class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">📊 Overall Averages</h2>
      <div id="overallRadarChartContainer" class="flex justify-center items-center h-96 w-full">
        <canvas id="overallRadarChart"></canvas>
      </div>
    </div>

    <div id="individualVotes" class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">🧑‍💻 Individual Votes</h2>
      <div class="overflow-x-auto rounded-lg border border-gray-300 shadow-sm">
        <table id="votesTable" class="min-w-full bg-white text-sm">
          <thead>
            <tr class="bg-gray-100 text-gray-700 uppercase text-left text-xs">
              <th class="py-2 px-3 border-b-2 border-gray-300">Voter</th>
              <th class="py-2 px-3 border-b-2 border-gray-300">Sample No.</th>
              <th class="py-2 px-3 border-b-2 border-gray-300">Roast Level</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Sweetness</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Acidity</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Body</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Aftertaste</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Fragrance</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Aroma</th>
              <th class="py-2 px-3 border-b-2 border-gray-300 text-center">Flavor</th>
              <th class="py-2 px-3 border-b-2 border-gray-300">Descriptors (Top 3)</th>
              <th class="py-2 px-3 border-b-2 border-gray-300">Timestamp</th>
            </tr>
          </thead>
          <tbody id="votesTableBody">
            </tbody>
        </table>
      </div>
      <p id="noVotesMessage" class="text-gray-500 text-center mt-4 hidden">ยังไม่มีข้อมูลการโหวตในห้องนี้</p>
    </div>

    <div class="text-center mt-6">
      <button id="backToHostBtn" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition-colors duration-300">
        ← กลับสู่ Dashboard
      </button>
    </div>
  </div>
</body>
</html>
