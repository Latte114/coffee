  <style>
    /* สไตล์เพิ่มเติมสำหรับ range input เพื่อให้ดูดีขึ้น */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: #d1d5db; /* gray-300 */
      outline: none;
      opacity: 0.7;
      transition: opacity 0.2s;
      border-radius: 4px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #10b981; /* green-500 */
      cursor: pointer;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #10b981; /* green-500 */
      cursor: pointer;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* เพิ่มสไตล์สำหรับจุดบอกระดับใน slider */
    .slider-container {
      position: relative;
      width: 100%;
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      width: calc(100% - 20px); /* Adjust for thumb size */
      position: absolute;
      top: -15px; /* Position above the slider */
      left: 10px; /* Align with slider track */
      font-size: 0.75rem; /* text-xs */
      color: #6b7280; /* gray-500 */
    }
    .slider-labels span {
        position: relative;
        transform: translateX(-50%);
    }
    .slider-labels span:nth-child(1) { transform: translateX(0%); } /* Low */
    .slider-labels span:nth-child(2) { transform: translateX(-50%); } /* Medium */
    .slider-labels span:nth-child(3) { transform: translateX(-100%); } /* High */
  </style>
</head>

        <label for="sweetnessNotes" class="block text-sm font-medium text-gray-700 mt-2">Notes</label>
        <textarea id="sweetnessNotes" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
      </div>

      <div class="border p-4 rounded-lg bg-gray-50">
        <h2 class="text-lg font-semibold mb-2">Body</h2>
        <div class="slider-container mb-4">
          <div class="slider-labels">
            <span>LOW</span>
            <span>MEDIUM</span>
            <span>HIGH</span>
          </div>
          <input type="range" min="0" max="15" value="7" id="bodyIntensity" class="w-full mt-4" />
          <div class="flex justify-between text-xs text-gray-500 px-1">
            <span>0</span><span>5</span><span>10</span><span>15</span>
          </div>
        </div>
        <label for="bodyNotes" class="block text-sm font-medium text-gray-700 mt-2">Notes</label>
        <textarea id="bodyNotes" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
      </div>

      <div class="border p-4 rounded-lg bg-gray-50">
        <h2 class="text-lg font-semibold mb-2">Mouthfeel</h2>
        <div class="slider-container mb-4">
          <div class="slider-labels">
            <span>LOW</span>
            <span>MEDIUM</span>
            <span>HIGH</span>
          </div>
          <input type="range" min="0" max="15" value="7" id="mouthfeelIntensity" class="w-full mt-4" />
          <div class="flex justify-between text-xs text-gray-500 px-1">
            <span>0</span><span>5</span><span>10</span><span>15</span>
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 mb-4">
          <label class="inline-flex items-center"><input type="checkbox" name="mouthfeelDescriptor" value="Rough (Gritty, Chalky, Sandy)" class="form-checkbox"> <span class="ml-2">Rough (Gritty, Chalky, Sandy)</span></label>
          <label class="inline-flex items-center"><input type="checkbox" name="mouthfeelDescriptor" value="Smooth (Velvety, Silky, Syrupy)" class="form-checkbox"> <span class="ml-2">Smooth (Velvety, Silky, Syrupy)</span></label>
          <label class="inline-flex items-center"><input type="checkbox" name="mouthfeelDescriptor" value="Metallic" class="form-checkbox"> <span class="ml-2">Metallic</span></label>
          <label class="inline-flex items-center"><input type="checkbox" name="mouthfeelDescriptor" value="Mouth-Drying" class="form-checkbox"> <span class="ml-2">Mouth-Drying</span></label>
          <label class="inline-flex items-center"><input type="checkbox" name="mouthfeelDescriptor" value="Oily" class="form-checkbox"> <span class="ml-2">Oily</span></label>
        </div>
        <label for="mouthfeelNotes" class="block text-sm font-medium text-gray-700 mt-2">Notes</label>
        <textarea id="mouthfeelNotes" rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
      </div>

      <button type="submit" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 w-full shadow-md transition-colors duration-300">ส่งคะแนน</button>
    </form>
    <div id="statusContainer" class="text-center mt-8" style="display: none;">
      <p id="statusMsg" class="mb-4 text-lg font-semibold text-gray-700"></p>
      <button id="backHomeBtn" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 shadow-md transition-colors duration-300">
        กลับสู่หน้าหลัก
      </button>
    </div>
  </div>
</body>
</html>
