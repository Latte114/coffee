    <style>
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%; /* เปลี่ยนเป็น 100% */
        height: 8px;
        background: #d1d5db;
        outline: none;
        opacity: 0.7;
        transition: opacity 0.2s;
        border-radius: 4px;
        padding: 0 8px; /* เพิ่ม padding ให้กับ input[type="range"] เพื่อบีบพื้นที่การเคลื่อนที่ของ thumb */
        box-sizing: border-box; /* ทำให้ padding ไม่เพิ่มขนาดโดยรวมของ input */
      }
      input[type="range"]::-webkit-slider-thumb,
      input[type="range"]::-moz-range-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: #10b981;
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #fff;
        /* อาจต้องปรับ margin-top เพื่อจัดแนวตั้งของ thumb ให้พอดีกับแถบ */
        margin-top: 0px; /* ปรับค่านี้ถ้า thumb ไม่ตรงกลาง */
      }
      .slider-container {
        position: relative;
        width: 100%;
        margin-bottom: 2rem;
      }
      .slider-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: #6b7280;
      }
      .slider-labels span {
        flex: 1;
        text-align: center;
      }
      /* สไตล์สำหรับปรับ input[type="range"] ให้พอดีกับ slider-labels */
      input[type="range"].with-labels {
        margin-left: -8px; /* ชดเชย padding */
        margin-right: -8px; /* ชดเชย padding */
        width: calc(100% + 16px); /* ชดเชย padding */
      }
    </style>
  </head>
