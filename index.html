<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Cupping App</title>
    <script type="module" src="app.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md space-y-8 transform transition-all duration-300 hover:scale-105">
      
      <header class="text-center">
        <div class="text-8xl mb-4 p-4 rounded-full bg-gray-50 inline-block transform rotate-6 hover:rotate-0 transition-transform duration-500">
            ☕
        </div>
        <h1 class="text-4xl font-extrabold text-gray-900 leading-none tracking-tight mt-4">
            CVA Form
        </h1>
      </header>
      
      <div id="message" class="text-red-500 text-center text-sm"></div>

      <input
        id="username"
        type="text"
        placeholder="Username (for Sign Up only)"
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-200 transition-all duration-200"
      />

      <input
        id="email"
        type="email"
        placeholder="Email"
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-200 transition-all duration-200"
      />
      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-200 transition-all duration-200"
      />

      <div class="flex flex-col gap-4 mt-6">
        <button
          id="signupBtn"
          class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 shadow-md transform hover:-translate-y-1 transition-transform duration-200"
        >
          Sign Up
        </button>
        <button
          id="loginBtn"
          class="bg-gray-700 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 shadow-md transform hover:-translate-y-1 transition-transform duration-200"
        >
          Login
        </button>
      </div>

      <div class="text-center mt-6">
        <button
          id="googleLoginBtn"
          class="bg-red-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-700 shadow-md transform hover:-translate-y-1 transition-transform duration-200"
        >
          Login with Google
        </button>
      </div>

    </div>
  </body>
</html>
