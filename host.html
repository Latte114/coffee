<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Host Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="host.js?v=1.0" defer></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
      <h1 class="text-3xl font-bold mb-6">☕ Host Cupping Dashboard</h1>

      <div class="mb-6">
        <h2 class="text-xl font-semibold mb-2">➕ Create Cupping Room</h2>
        <div class="flex gap-2">
          <input
            id="roomName"
            type="text"
            placeholder="Room name"
            class="border p-2 rounded w-full"
          />
          <button
            id="createRoomBtn"
            class="bg-blue-600 text-white px-4 py-2 rounded"
          >
            Create
          </button>
        </div>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4">📋 Cupping Rooms</h2>
        <ul id="roomList" class="space-y-4"></ul>
      </div>
    </div>
  </body>
</html>
